    <style>
    body {
  margin: 0;
  padding: 0;
  overflow: hidden;
}

#deck-container {
  width: 100vw;
  height: 100vh;
}

#deck-container canvas {
  z-index: 1;
  background: none;
}

#deck-container .error_text {
  color: red;
  background: none;
  position: absolute;
  z-index: 100;
}

  <body>
    <div id="deck-container">
    </div>
  
    <style>
        #theme-switcher {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 8px 12px;
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 14px;
            z-index: 1000;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        #theme-switcher:hover {
            background-color: rgba(255, 255, 255, 1.0);
        }
    </style>

    <button id="theme-switcher">Switch to Dark Theme</button>

    <script type="text/javascript">
        // This function waits for the deckInstance to be available on the window object.
        // pydeck creates this instance in a script at the end of the body.
        function initializeThemeSwitcher() {
            if (typeof deckInstance !== 'undefined') {
                const themeSwitcher = document.getElementById('theme-switcher');
                if (themeSwitcher) {
                    const lightStyle = 'https://basemaps.cartocdn.com/gl/voyager-nolabels-gl-style/style.json';
                    const darkStyle = 'https://basemaps.cartocdn.com/gl/dark-matter-nolabels-gl-style/style.json';
                    let isLight = true;

                    themeSwitcher.addEventListener('click', () => {
                        isLight = !isLight;
                        const newStyle = isLight ? lightStyle : darkStyle;
                        themeSwitcher.textContent = isLight ? 'Switch to Dark Theme' : 'Switch to Light Theme';
                        Promise.resolve(deckInstance).then(d => d.setProps({ mapStyle: newStyle }));
                    });
                }
            } else {
                // If deckInstance is not ready, try again in a moment.
                setTimeout(initializeThemeSwitcher, 100);
            }
        }

        // Start checking for the deck instance once the document is loaded.
        window.addEventListener('load', initializeThemeSwitcher);
    </script>
